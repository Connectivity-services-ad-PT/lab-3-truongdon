name: Newman Contract Tests

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  newman:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint OpenAPI contracts
        run: npm run lint:contracts

      - name: Start Prism IoT mock
        run: |
          npx prism mock contracts/iot-ingestion.openapi.yaml \
          -p 4010 \
          --host 0.0.0.0 > prism-iot.log 2>&1 &

      - name: Start Prism Vision mock
        run: |
          npx prism mock contracts/ai-vision.openapi.yaml \
          -p 4011 \
          --host 0.0.0.0 > prism-vision.log 2>&1 &

      - name: Wait for IoT mock
        run: npx wait-on http://127.0.0.1:4010/health --timeout 60000

      - name: Wait for Vision mock
        run: npx wait-on http://127.0.0.1:4011/health --timeout 60000

      - name: Run Newman contract tests
        run: npm run test:mock

      - name: Show Prism logs on failure
        if: failure()
        run: |
          echo "========== IOT LOG =========="
          cat prism-iot.log || true

          echo "========== VISION LOG =========="
          cat prism-vision.log || true

      - name: Upload Newman reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: newman-reports
          path: reports/